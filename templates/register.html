<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — MailScheduler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    :root{--bg-primary:#0a0a14;--bg-card:#16162a;--border:rgba(108,99,255,0.18);--accent:#6c63ff;--accent-2:#a78bfa;--accent-3:#38bdf8;--text-primary:#f0f0ff;--text-secondary:#9999bb;--text-muted:#55557a;--danger:#ef4444;--success:#10b981;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;overflow-x:hidden;}
    .auth-blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.1;pointer-events:none;}
    .blob-1{width:600px;height:600px;background:var(--accent);top:-200px;right:-200px;}
    .blob-2{width:400px;height:400px;background:var(--accent-2);bottom:-100px;left:-100px;}
    .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .auth-card{width:100%;max-width:480px;background:var(--bg-card);border:1px solid var(--border);border-radius:22px;padding:44px 40px;box-shadow:0 28px 72px rgba(0,0,0,0.55);position:relative;z-index:1;animation:fadeUp .45s ease;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}
    .auth-logo{display:flex;align-items:center;gap:14px;margin-bottom:32px;}
    .auth-logo-icon{width:50px;height:50px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent-2));display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 8px 24px rgba(108,99,255,0.4);}
    .brand{font-size:20px;font-weight:800;background:linear-gradient(90deg,var(--accent),var(--accent-2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .brand-sub{font-size:12px;color:var(--text-muted);}
    .auth-heading{font-size:25px;font-weight:800;color:var(--text-primary);margin-bottom:6px;}
    .auth-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px;}
    .input-wrap{position:relative;}
    .input-icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px;pointer-events:none;}
    .form-control{width:100%;padding:11px 13px 11px 38px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text-primary);font-family:inherit;font-size:14px;transition:border-color .2s,box-shadow .2s;}
    .form-control:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,99,255,0.15);}
    .form-control::placeholder{color:var(--text-muted);}
    .pw-toggle{position:absolute;right:13px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:14px;transition:color .2s;}
    .pw-toggle:hover{color:var(--accent);}
    .pw-field{padding-right:38px;}
    .pw-strength{height:3px;border-radius:3px;background:var(--border);margin-top:6px;overflow:hidden;}
    .pw-strength-bar{height:100%;border-radius:3px;transition:width .3s,background .3s;}
    .btn-submit{width:100%;padding:13px;background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 6px 22px rgba(108,99,255,0.38);transition:all .2s;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:8px;}
    .btn-submit:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(108,99,255,0.5);}
    .auth-footer{text-align:center;font-size:13px;color:var(--text-muted);margin-top:20px;}
    .auth-footer a{color:var(--accent);text-decoration:none;font-weight:600;}
    .alerts{margin-bottom:16px;}
    .alert{display:flex;align-items:flex-start;gap:10px;padding:11px 15px;border-radius:10px;margin-bottom:7px;font-size:13px;}
    .alert-danger{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;}
    .alert-success{background:rgba(16,185,129,0.12);border:1px solid rgba(16,185,129,0.3);color:#6ee7b7;}
    .alert-close{margin-left:auto;background:none;border:none;cursor:pointer;color:inherit;opacity:.6;}
  </style>
</head>
<body>
<div class="auth-blob blob-1"></div>
<div class="auth-blob blob-2"></div>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon"><i class="fas fa-envelope-open-text"></i></div>
      <div>
        <div class="brand">MailScheduler</div>
        <div class="brand-sub">Create your account</div>
      </div>
    </div>

    <h1 class="auth-heading">Get started free</h1>
    <p class="auth-sub">Set up your account in seconds</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="alerts">
        {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">
          <i class="fas fa-{% if cat == 'success' %}circle-check{% else %}circle-xmark{% endif %}"></i>
          <span>{{ msg }}</span>
          <button class="alert-close" onclick="this.parentElement.remove()">&times;</button>
        </div>
        {% endfor %}
      </div>
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('register') }}" id="regForm">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrap">
          <i class="fas fa-user input-icon"></i>
          <input type="text" id="username" name="username" class="form-control"
            placeholder="Choose a username" value="{{ request.form.get('username','') }}"
            minlength="3" required autocomplete="username" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrap">
          <i class="fas fa-envelope input-icon"></i>
          <input type="email" id="email" name="email" class="form-control"
            placeholder="your@email.com" value="{{ request.form.get('email','') }}"
            required autocomplete="email" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="password" name="password" class="form-control pw-field"
            placeholder="Min. 8 characters" minlength="8" required
            oninput="checkStrength(this.value)" />
          <button type="button" class="pw-toggle" onclick="togglePw('password',this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
        <div class="pw-strength"><div class="pw-strength-bar" id="pwBar"></div></div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock input-icon"></i>
          <input type="password" id="confirm_password" name="confirm_password" class="form-control pw-field"
            placeholder="Repeat password" required />
          <button type="button" class="pw-toggle" onclick="togglePw('confirm_password',this)">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>

      <button type="submit" class="btn-submit">
        <i class="fas fa-user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </div>
  </div>
</div>

<script>
  function togglePw(id, btn) {
    const f = document.getElementById(id);
    const i = btn.querySelector('i');
    f.type = f.type === 'password' ? 'text' : 'password';
    i.className = f.type === 'text' ? 'fas fa-eye-slash' : 'fas fa-eye';
  }

  function checkStrength(val) {
    const bar = document.getElementById('pwBar');
    let score = 0;
    if (val.length >= 8) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const pct = (score / 4) * 100;
    const colors = ['#ef4444','#f59e0b','#10b981','#6c63ff'];
    bar.style.width = pct + '%';
    bar.style.background = colors[score - 1] || '#ef4444';
  }
</script>
</body>
</html>
